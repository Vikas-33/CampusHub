{% extends 'base.html' %}
{% block title %}Add Teacher{% endblock %}
{% block page_title %}Add New Teacher{% endblock %}
{% block page_subtitle %}Register a new faculty member{% endblock %}
{% block content %}
<div class="card" style="max-width: 800px;">
  <div class="card-header"><span class="card-title">Teacher Information</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label class="form-label">First Name *</label><input type="text" name="first_name" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Last Name *</label><input type="text" name="last_name" class="form-input" required></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Username *</label><input type="text" name="username" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Email *</label><input type="email" name="email" class="form-input" required></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Employee ID *</label><input type="text" name="employee_id" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Password <small>(default: teacher123)</small></label><input type="password" name="password" class="form-input"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Department *</label><input type="text" name="department" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Designation *</label><input type="text" name="designation" class="form-input" placeholder="e.g. Associate Professor" required></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Qualification *</label><input type="text" name="qualification" class="form-input" placeholder="e.g. Ph.D. Computer Science" required></div>
        <div class="form-group"><label class="form-label">Specialization</label><input type="text" name="specialization" class="form-input"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Joining Date</label><input type="date" name="joining_date" class="form-input"></div>
        <div class="form-group"><label class="form-label">Salary (₹)</label><input type="number" name="salary" class="form-input" step="0.01"></div>
      </div>
      <div style="display:flex; gap:12px; margin-top:8px;">
        <button type="submit" class="btn btn-accent">Add Teacher</button>
        <a href="{% url 'manage_teachers' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
