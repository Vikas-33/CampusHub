{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Complete — EduCore</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page" style="justify-content:center;">
  <div class="auth-right" style="flex:0 0 480px;">
    <div class="auth-form" style="text-align:center;">
      <div style="font-size:64px; margin-bottom:16px;">✅</div>
      <h2>Password Reset Complete</h2>
      <p style="margin-bottom:32px; color:var(--text-secondary);">
        Your password has been successfully reset. You can now log in with your new password.
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:15px;">
        Sign In →
      </a>
    </div>
  </div>
</div>
</body>
</html>
