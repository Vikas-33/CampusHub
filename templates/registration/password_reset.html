{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — CampusHub</title>
<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page" style="justify-content:center;">
  <div class="auth-right" style="flex:0 0 480px;">
    <div class="auth-form">
      <div class="auth-logo">
        <div class="icon">E</div>
        <span>CampusHub</span>
      </div>
      <h2>Forgot Password?</h2>
      <p style="margin-bottom:24px;">Enter your email address and we'll send you a link to reset your password.</p>

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-input" placeholder="Enter your registered email" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px;">
          Send Reset Link →
        </button>
      </form>

      <p style="margin-top:24px; text-align:center; font-size:14px; color:var(--text-secondary);">
        Remember your password? <a href="{% url 'login' %}" style="color:var(--highlight); font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
