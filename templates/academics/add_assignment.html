{% extends 'base.html' %}
{% block title %}Create Assignment{% endblock %}
{% block page_title %}Create Assignment{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header"><span class="card-title">Assignment Details</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label class="form-label">Course *</label>{{ form.course }}</div>
      <div class="form-group"><label class="form-label">Title *</label><input type="text" name="title" class="form-input" required></div>
      <div class="form-group"><label class="form-label">Description *</label><textarea name="description" class="form-input" rows="4" required></textarea></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Due Date *</label><input type="datetime-local" name="due_date" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Total Marks</label><input type="number" name="total_marks" class="form-input" value="100"></div>
      </div>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-accent">Create Assignment</button>
        <a href="{% url 'assignments' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
