{% extends 'base.html' %}
{% block title %}Add Department{% endblock %}
{% block page_title %}Add Department{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-header"><span class="card-title">Department Details</span></div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Department Name *</label><input type="text" name="name" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Department Code *</label><input type="text" name="code" class="form-input" placeholder="e.g. CSE" required></div>
      </div>
      <div class="form-group"><label class="form-label">Head of Department</label>{{ form.head_of_department }}</div>
      <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-input" rows="3"></textarea></div>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-accent">Add Department</button>
        <a href="{% url 'departments' college_slug=college_slug %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
