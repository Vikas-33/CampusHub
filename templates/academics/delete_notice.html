{% extends 'base.html' %}
{% block title %}Delete Notice{% endblock %}
{% block page_title %}Delete Notice{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
  <div class="card-header"><span class="card-title" style="color:var(--red);">Delete Notice</span></div>
  <div class="card-body">
    <div class="alert alert-error">This action cannot be undone.</div>
    <p style="color:var(--text-secondary); margin-bottom:24px;">Are you sure you want to delete this notice?</p>
    <form method="post">{% csrf_token %}
      <div style="display:flex; gap:10px;">
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'notices' college_slug=college_slug %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
