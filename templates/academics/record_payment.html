{% extends 'base.html' %}
{% block title %}Record Payment{% endblock %}
{% block page_title %}Record Fee Payment{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header"><span class="card-title">Payment Details</span></div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Student *</label>{{ form.student }}</div>
        <div class="form-group"><label class="form-label">Fee Structure *</label>{{ form.fee_structure }}</div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Amount Paid (₹) *</label><input type="number" name="amount_paid" class="form-input" step="0.01" required></div>
        <div class="form-group"><label class="form-label">Payment Date</label><input type="date" name="payment_date" class="form-input"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Status</label>{{ form.status }}</div>
        <div class="form-group"><label class="form-label">Transaction ID</label><input type="text" name="transaction_id" class="form-input"></div>
      </div>
      <div class="form-group"><label class="form-label">Receipt Number</label><input type="text" name="receipt_number" class="form-input"></div>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-success">Record Payment</button>
        <a href="{% url 'fees' college_slug=college_slug %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
