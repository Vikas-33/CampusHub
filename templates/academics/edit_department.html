{% extends 'base.html' %}
{% block title %}Edit Department{% endblock %}
{% block page_title %}Edit Department{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-header"><span class="card-title">Edit — {{ dept.name }}</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Department Name *</label>
          <input type="text" name="name" class="form-input" value="{{ dept.name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Department Code *</label>
          <input type="text" name="code" class="form-input" value="{{ dept.code }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Head of Department</label>
        <select name="head_of_department" class="form-input">
          <option value="">— None —</option>
          {% for teacher in teachers %}
            <option value="{{ teacher.pk }}"
              {% if dept.head_of_department and dept.head_of_department.pk == teacher.pk %}selected{% endif %}>
              {{ teacher.user.get_full_name }} ({{ teacher.employee_id }})
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-input" rows="3">{{ dept.description }}</textarea>
      </div>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-accent">Save Changes</button>
        <a href="{% url 'departments' college_slug %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
