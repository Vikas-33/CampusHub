{% extends 'base.html' %}
{% block title %}Add Course{% endblock %}
{% block page_title %}Add New Course{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header"><span class="card-title">Course Details</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Course Name *</label><input type="text" name="name" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Course Code *</label><input type="text" name="code" class="form-input" required></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Department *</label>{{ form.department }}</div>
        <div class="form-group"><label class="form-label">Assigned Teacher</label>{{ form.teacher }}</div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Semester *</label><select name="semester" class="form-input" required>{% for i in "12345678" %}<option value="{{ i }}">Semester {{ i }}</option>{% endfor %}</select></div>
        <div class="form-group"><label class="form-label">Credits *</label><input type="number" name="credits" class="form-input" value="3" min="1" max="6" required></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-input" rows="3"></textarea></div>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-accent">Add Course</button>
        <a href="{% url 'courses' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
