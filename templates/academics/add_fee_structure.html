{% extends 'base.html' %}
{% block title %}Add Fee Structure{% endblock %}
{% block page_title %}Add Fee Structure{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-header"><span class="card-title">Fee Structure Details</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label class="form-label">Name *</label><input type="text" name="name" class="form-input" placeholder="e.g. Tuition Fee Sem 1" required></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Amount (₹) *</label><input type="number" name="amount" class="form-input" step="0.01" required></div>
        <div class="form-group"><label class="form-label">Due Date</label><input type="date" name="due_date" class="form-input"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Department (leave blank for all)</label><input type="text" name="department" class="form-input"></div>
        <div class="form-group"><label class="form-label">Semester</label><select name="semester" class="form-input"><option value="">All</option>{% for i in "12345678" %}<option value="{{ i }}">Sem {{ i }}</option>{% endfor %}</select></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-input" rows="2"></textarea></div>
      <div style="display:flex; gap:12px;">
        <button type="submit" class="btn btn-accent">Add Structure</button>
        <a href="{% url 'fees' college_slug=college_slug %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
